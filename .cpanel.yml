---
deployment:
  tasks:
    # Backend: use the CloudLinux NodeJS Selector wrapper as intended — it
    # symlinks this app's node_modules into its registered venv correctly.
    - export NODEBIN=$(ls -d /home/sturxitc/nodevenv/sturdylife-api/backend/*/bin | head -n 1)
    - cd /home/sturxitc/sturdylife-api/backend && $NODEBIN/npm install --production

    # Frontend: there's no registered Node.js App for it, so the wrapper's
    # npm would (wrongly) resolve the *backend's* package.json/node_modules
    # via CL_APP_ROOT instead of the frontend's. Call the real npm binary
    # directly, bypassing the wrapper, so it operates on the frontend's own
    # package.json in the current directory like a normal npm install.
    - export REALNPM=/opt/alt/alt-nodejs20/root/usr/bin/npm
    - rm -rf /home/sturxitc/sturdylife-api/frontend/node_modules
    - cd /home/sturxitc/sturdylife-api/frontend && VITE_API_URL=https://api.sturdylifer.com/api $REALNPM install
    - cd /home/sturxitc/sturdylife-api/frontend && VITE_API_URL=https://api.sturdylifer.com/api $REALNPM run build
    # trailing "/." (not "/*") so dotfiles like .htaccess get copied too —
    # bash globs don't match dotfiles by default.
    - /bin/cp -r /home/sturxitc/sturdylife-api/frontend/dist/. /home/sturxitc/public_html/

    - /bin/mkdir -p /home/sturxitc/sturdylife-api/backend/tmp
    - /bin/touch /home/sturxitc/sturdylife-api/backend/tmp/restart.txt
